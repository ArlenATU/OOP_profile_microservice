<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            width:360px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        .welcome-text{
            margin-bottom:30px;
            color:#666;
            font-size:16px;
            line-height:1.5;
        }

        .button-group{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#4e73df;
            border:none;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
            text-decoration:none;
            display:inline-block;
        }

        .btn:hover{
            background:#2e59d9;
        }

        .btn-secondary{
            background:#1cc88a;
        }

        .btn-secondary:hover{
            background:#17a673;
        }

        .footer{
            margin-top:20px;
            font-size:13px;
            color:#777;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Welcome</h2>

    <p class="welcome-text">
        Welcome to our application. Please login to your account or create a new one to get started.
    </p>

    <div class="button-group">
        <a href="login.html" class="btn">Login</a>
        <a href="register.html" class="btn btn-secondary">Create Account</a>
    </div>

    <div class="footer">
        &copy; 2026 DandS Project
    </div>

</div>

</body>
</html>
